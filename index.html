<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 即時語音轉文字</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5); 
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(75, 85, 99, 0.8); 
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 1); 
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 flex flex-col font-sans selection:bg-blue-500/30">

    <!-- 頂部導覽列 -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-wrap items-center justify-between shadow-sm z-10 gap-4">
        <div class="flex items-center gap-3">
            <div id="header-icon-bg" class="p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors duration-300">
                <i data-lucide="mic" id="header-icon-mic"></i>
                <i data-lucide="mic-off" id="header-icon-mic-off" class="hidden"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider hidden sm:block">AI 即時語音轉文字</h1>
            <span class="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded-md border border-gray-600 font-medium">瀏覽器原生引擎</span>
        </div>
        
        <div class="flex items-center gap-4 flex-wrap">
            <!-- 粵語轉書面語開關 -->
            <label class="flex items-center cursor-pointer gap-2" title="開啟後，會自動將廣東話口語轉為標準中文書面語">
                <span class="text-sm text-gray-300 hidden sm:inline">轉書面語</span>
                <span class="text-sm text-gray-300 sm:hidden">轉書面語</span>
                <div class="relative flex items-center">
                    <input type="checkbox" id="toggle-yue-md" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 peer-checked:after:bg-white after:border-gray-400 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                </div>
            </label>

            <!-- 語言選擇 -->
            <div class="flex items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-lg border border-gray-700">
                <i data-lucide="settings" class="text-gray-400 w-4 h-4"></i>
                <select id="language-select" class="bg-gray-900 text-sm text-gray-200 outline-none cursor-pointer disabled:opacity-50">
                    <option value="zh-HK" class="bg-gray-900" selected>繁體中文 (香港)</option>
                    <option value="zh-TW" class="bg-gray-900">繁體中文 (台灣)</option>
                    <option value="zh-CN" class="bg-gray-900">簡體中文 (中國)</option>
                    <option value="en-US" class="bg-gray-900">English (US)</option>
                    <option value="ja-JP" class="bg-gray-900">日本語 (日本)</option>
                </select>
            </div>
        </div>
    </header>

    <!-- 系統音訊模式提示 -->
    <div class="bg-blue-500/10 border-l-4 border-blue-500 p-4 m-6 mb-0 rounded-r-lg flex flex-col sm:flex-row items-start gap-3 shadow-sm">
        <i data-lucide="info" class="text-blue-400 shrink-0 mt-0.5 w-5 h-5"></i>
        <div class="text-blue-300 text-sm leading-relaxed flex-1">
            <p class="font-bold mb-1 text-blue-200">【字幕視窗優化】文字超過 12 個字將自動清空重置</p>
            <p>已開啟「單行置頂」模式。若您的 Chrome 版本支援 PiP 功能，點擊下方「字幕視窗」即可獲得置頂字幕體驗。</p>
        </div>
    </div>

    <!-- 錯誤提示區塊 -->
    <div id="error-container" class="hidden bg-red-500/10 border-l-4 border-red-500 p-4 m-6 mb-0 rounded-r-lg flex items-start gap-3">
        <i data-lucide="alert-circle" class="text-red-500 shrink-0 mt-0.5 w-5 h-5"></i>
        <p id="error-message" class="text-red-400 text-sm leading-relaxed"></p>
    </div>

    <!-- 主要文字顯示區 -->
    <main class="flex-1 flex flex-col p-6 max-w-5xl w-full mx-auto relative overflow-hidden">
        <div id="transcript-container" class="flex-1 bg-gray-800/50 border border-gray-700/50 rounded-2xl p-6 md:p-8 overflow-y-auto shadow-inner relative flex flex-col scroll-smooth">
            
            <!-- 浮水印提示 -->
            <div id="placeholder-text" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
                <p class="text-xl font-light tracking-widest flex flex-col items-center gap-4">
                    <i data-lucide="mic" class="w-12 h-12"></i>
                    點擊下方按鈕開始語音辨識
                </p>
            </div>

            <!-- 文字內容：統一顯示為正式文字 -->
            <div class="text-2xl md:text-3xl leading-relaxed md:leading-loose tracking-wide break-words pb-10">
                <span id="final-transcript" class="text-gray-100 transition-colors duration-200"></span>
                <span id="cursor-anim" class="hidden inline-block w-2 h-6 md:h-8 bg-blue-500 ml-2 animate-pulse align-middle rounded-full"></span>
                <div id="transcript-end"></div>
            </div>
        </div>

        <!-- 底部控制面板 -->
        <div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4 bg-gray-800 p-4 rounded-2xl border border-gray-700">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                
                <!-- 音軌選擇器 -->
                <div class="flex items-center gap-2 bg-gray-900 px-3 py-2.5 rounded-xl border border-gray-700 w-full sm:w-auto relative group">
                    <i data-lucide="volume-2" class="text-gray-400 w-4 h-4"></i>
                    <select id="device-select" class="bg-gray-900 text-sm text-gray-200 outline-none cursor-pointer w-full max-w-[180px] truncate disabled:opacity-50 appearance-none pr-4">
                        <optgroup label="實體與虛擬裝置" id="device-list" class="bg-gray-900">
                            <option value="" class="bg-gray-900">讀取裝置中...</option>
                        </optgroup>
                    </select>
                    <div class="absolute right-3 pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <button id="btn-toggle" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30">
                    <i data-lucide="mic" id="btn-icon-mic" class="w-5 h-5"></i>
                    <span id="btn-pulse" class="hidden w-2.5 h-2.5 bg-white rounded-full animate-pulse"></span>
                    <span id="btn-text">開始說話</span>
                </button>
                
                <!-- 字幕視窗按鈕 -->
                <button id="btn-pip" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-3 rounded-xl font-medium transition-all duration-300 bg-gray-700 hover:bg-gray-600 text-white border border-gray-600" title="開啟桌面懸浮字幕視窗">
                    <i data-lucide="monitor-up" class="w-5 h-5"></i>
                    <span class="sm:hidden lg:inline">字幕視窗</span>
                </button>

                <!-- 狀態指示 -->
                <div class="hidden sm:flex items-center gap-2 text-sm text-gray-400">
                    <span class="relative flex h-3 w-3">
                        <span id="status-ping" class="hidden animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-gray-600"></span>
                    </span>
                    <span id="status-text">待機中</span>
                </div>

                <!-- 音量跳動指示器 -->
                <div id="volume-container" class="hidden sm:flex items-center gap-2 ml-2 w-32 transition-opacity duration-300 opacity-30">
                    <span class="text-xs text-gray-500">音量</span>
                    <div class="flex-1 h-2 bg-gray-700/50 rounded-full overflow-hidden border border-gray-600/50 relative">
                        <div id="volume-bar" class="h-full bg-green-500 rounded-full w-0 transition-all duration-75 ease-out"></div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button id="btn-copy" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors" title="複製全文">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span class="sm:hidden">複製</span>
                </button>
                <button id="btn-clear" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-gray-700 hover:bg-red-500/20 hover:text-red-400 text-gray-200 transition-colors" title="清除文字">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span class="sm:hidden">清除</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-gray-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
        <i data-lucide="check" id="toast-icon" class="text-green-400 w-4 h-4"></i>
        <span id="toast-message"></span>
    </div>

    <!-- 應用程式邏輯 -->
    <script>
        // 初始化 Lucide Icons
        lucide.createIcons();

        // --- 粵語(廣東話) 轉 中文書面語 字典 ---
        const yueToWrittenMap = {
            '的士': '計程車', '巴士': '公車', '小巴': '小型公車', '輕鐵': '輕軌',
            '雪糕': '冰淇淋', '朱古力': '巧克力', '士多啤梨': '草莓', '雲呢拿': '香草', '班戟': '鬆餅',
            '多士': '吐司', '三文治': '三明治', '沙律': '沙拉', '啫喱': '果凍', '忌廉': '鮮奶油',
            '芝士': '起司', '牛油果': '酪梨', '薯仔': '馬鈴薯', '青瓜': '小黃瓜', '粟米': '玉米',
            '雪櫃': '冰箱', '冷氣': '冷氣', '手提電話': '手機', '差電': '充電', '單車': '腳踏車', '電單車': '機車',
            '質素': '品質', '戶口': '帳戶', '好似': '彷彿', '點解': '為什麼',
            '返工': '上班', '放工': '下班', '番工': '上班', '返學': '上學', '番學': '上學', '放學': '放學',
            '傾偈': '交談', '屋企': '家裡', '食飯': '用餐', '飲水': '喝水',
            '睇戲': '看電影', '行街': '逛街', '買嘢': '購物', '畀錢': '付款', '搵錢': '賺錢',
            '做嘢': '工作', '瞓覺': '睡覺', '起身': '起床', '沖涼': '沐浴', '食煙': '抽菸', '飲酒': '喝酒',
            '有冇': '有沒有', '係咪': '是不是', '好唔好': '好不好', '得唔得': '行不行', '唔得': '不行',
            '唔記得': '忘記了', '病咗': '生病了', '頸渴': '口渴', '為咗': '為了', '早晨': '早安', '隔籬': '隔壁',
            '鍾意': '喜歡', '唔鍾意': '不喜歡',
            '點樣': '如何', '邊度': '哪裡', '邊個': '誰', '幾時': '何時', '幾多': '多少',
            '咁樣': '如此', '呢度': '這裡', '嗰度': '那裡', 
            '佢哋': '他們', '我哋': '我們', '你哋': '你們', '佢': '他',
            '聽日': '明天', '琴日': '昨天', '尋日': '昨天', '今日': '今天', '而家': '現在', '依家': '現在',
            '頭先': '剛才', '一陣': '稍後', '次次': '每次', '成日': '經常', '真係': '確實',
            '係': '是', '唔': '不', '喺': '在', '嘅': '的', '嗰': '那', '呢': '這', '咁': '那麼', '啲': '的',
            '乜': '什麼', '嘢': '事物', '晒': '完', '咗': '了', '緊': '正在', '住': '著',
            '埋': '連同', '先': '才', '仲': '還', '諗': '思考', '識': '懂', '明': '明白',
            '覺': '覺得', '靚': '美麗', '污糟': '骯髒', '攰': '疲勞', '痕': '發癢', '憎': '厭惡',
            '攞': '拿取', '擺': '放置', '閂': '關閉', '企': '站立', '行': '行走', '著': '穿著', '除': '脫下',
            '痴': '黏貼', '喊': '哭泣', '彈': '批評', '畀': '給予', '睇': '觀看'
        };

        // DOM 元素參考
        const ui = {
            languageSelect: document.getElementById('language-select'),
            toggleYueMd: document.getElementById('toggle-yue-md'),
            deviceSelect: document.getElementById('device-select'),
            deviceList: document.getElementById('device-list'),
            btnToggle: document.getElementById('btn-toggle'),
            btnPip: document.getElementById('btn-pip'),
            btnIconMic: document.getElementById('btn-icon-mic'),
            btnPulse: document.getElementById('btn-pulse'),
            btnText: document.getElementById('btn-text'),
            btnCopy: document.getElementById('btn-copy'),
            btnClear: document.getElementById('btn-clear'),
            finalTranscript: document.getElementById('final-transcript'),
            transcriptContainer: document.getElementById('transcript-container'),
            placeholderText: document.getElementById('placeholder-text'),
            cursorAnim: document.getElementById('cursor-anim'),
            errorContainer: document.getElementById('error-container'),
            errorMessage: document.getElementById('error-message'),
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toast-message'),
            toastIcon: document.getElementById('toast-icon'),
            headerIconBg: document.getElementById('header-icon-bg'),
            headerIconMic: document.getElementById('header-icon-mic'),
            headerIconMicOff: document.getElementById('header-icon-mic-off'),
            statusPing: document.getElementById('status-ping'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            volumeContainer: document.getElementById('volume-container'),
            volumeBar: document.getElementById('volume-bar'),
            transcriptEnd: document.getElementById('transcript-end')
        };

        // 狀態變數
        let isListening = false;
        let isStarted = false;
        let finalStr = '';
        let interimStr = '';
        let latestSubtitle = ''; 
        let subtitleTimeout = null; 
        let recognition = null;
        let toastTimeout = null;

        // 懸浮視窗變數
        let pipWindow = null; 
        let subtitleContainer = null;

        // 音訊視覺化相關變數
        let audioCtx = null;
        let analyser = null;
        let animationFrameId = null;
        let activeStream = null;

        // --- UI 更新與輔助功能 ---
        function showError(msg) {
            if (msg) {
                ui.errorMessage.textContent = msg;
                ui.errorContainer.classList.remove('hidden');
            } else {
                ui.errorContainer.classList.add('hidden');
            }
        }

        function showToast(msg, type = 'success') {
            ui.toastMessage.textContent = msg;
            if (type === 'success') {
                ui.toastIcon.setAttribute('data-lucide', 'check');
                ui.toastIcon.classList.remove('text-yellow-400');
                ui.toastIcon.classList.add('text-green-400');
            } else if (type === 'warning') {
                ui.toastIcon.setAttribute('data-lucide', 'alert-triangle');
                ui.toastIcon.classList.remove('text-green-400');
                ui.toastIcon.classList.add('text-yellow-400');
            }
            lucide.createIcons();
            ui.toast.classList.remove('opacity-0', 'translate-y-4');
            ui.toast.classList.add('opacity-100', 'translate-y-0');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                ui.toast.classList.remove('opacity-100', 'translate-y-0');
                ui.toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        function scrollToBottom() {
            ui.transcriptContainer.scrollTop = ui.transcriptContainer.scrollHeight;
        }

        // 更新懸浮視窗的字幕 (加入 12 字清洗邏輯)
        function updateSubtitleUI() {
            if (subtitleContainer) {
                // 如果目前的字幕內容長度超過 12，則進行「清洗」：只保留最後一小段或清空
                // 這裡採用「超過 12 字直接重置」的邏輯，最符合您的要求
                if (latestSubtitle.length > 12) {
                    latestSubtitle = latestSubtitle.slice(-1); // 留下最後一個字作為銜接，或設為 ""
                }
                subtitleContainer.textContent = latestSubtitle || '等待語音輸入...';
            }
        }

        function updateTranscriptUI() {
            ui.finalTranscript.textContent = finalStr + interimStr;
            if (!finalStr && !interimStr && !isListening) {
                ui.placeholderText.classList.remove('hidden');
            } else {
                ui.placeholderText.classList.add('hidden');
            }
            scrollToBottom();
        }

        function updateListeningUI() {
            if (isListening) {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-red-500/20 text-red-500 animate-pulse transition-colors duration-300';
                ui.headerIconMic.classList.add('hidden');
                ui.headerIconMicOff.classList.remove('hidden');
            } else {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors duration-300';
                ui.headerIconMic.classList.remove('hidden');
                ui.headerIconMicOff.classList.add('hidden');
            }
            ui.languageSelect.disabled = isListening;
            ui.deviceSelect.disabled = isListening;
            if (isListening) ui.cursorAnim.classList.remove('hidden');
            else ui.cursorAnim.classList.add('hidden');

            if (isListening) {
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-500/30';
                ui.btnIconMic.classList.add('hidden');
                ui.btnPulse.classList.remove('hidden');
                ui.btnText.textContent = '停止聆聽';
            } else {
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30';
                ui.btnIconMic.classList.remove('hidden');
                ui.btnPulse.classList.add('hidden');
                ui.btnText.textContent = '開始說話';
            }
            if (isListening) {
                ui.statusPing.classList.remove('hidden');
                ui.statusDot.className = 'relative inline-flex rounded-full h-3 w-3 bg-green-500';
                ui.statusText.textContent = '聆聽中';
                ui.volumeContainer.classList.remove('opacity-30', 'hidden');
                ui.volumeContainer.classList.add('opacity-100', 'flex');
            } else {
                ui.statusPing.classList.add('hidden');
                ui.statusDot.className = 'relative inline-flex rounded-full h-3 w-3 bg-gray-600';
                ui.statusText.textContent = '待機中';
                ui.volumeContainer.classList.add('opacity-30');
            }
            updateTranscriptUI();
        }

        async function getDevices() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(d => d.kind === 'audioinput');
                ui.deviceList.innerHTML = '';
                audioInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.className = 'bg-gray-900';
                    option.textContent = device.label || `音訊裝置 ${index + 1}`;
                    ui.deviceList.appendChild(option);
                });
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                ui.deviceList.innerHTML = '<option value="">無法獲取裝置</option>';
            }
        }

        function convertYueToWritten(text) {
            if (!text) return { text: '', count: 0 };
            let convertedText = text;
            let count = 0;
            const sortedKeys = Object.keys(yueToWrittenMap).sort((a, b) => b.length - a.length);
            for (const hk of sortedKeys) {
                const tw = yueToWrittenMap[hk];
                const regex = new RegExp(hk, 'g');
                if (convertedText.match(regex)) {
                    count += convertedText.match(regex).length;
                    convertedText = convertedText.replace(regex, tw);
                }
            }
            return { text: convertedText, count };
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showError('您的瀏覽器不支援語音辨識。');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = ui.languageSelect.value;
            
            recognition.onstart = () => { isStarted = true; showError(''); };
            recognition.onresult = (event) => {
                let tempFinal = '';
                let tempInterim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) tempFinal += event.results[i][0].transcript;
                    else tempInterim += event.results[i][0].transcript;
                }
                const isConvertEnabled = ui.toggleYueMd.checked;
                let transFinal = tempFinal ? (isConvertEnabled ? convertYueToWritten(tempFinal).text : tempFinal) : '';
                let transInterim = tempInterim ? (isConvertEnabled ? convertYueToWritten(tempInterim).text : tempInterim) : '';

                if (transFinal) {
                    finalStr += transFinal + '，';
                    latestSubtitle = transFinal; 
                }
                interimStr = transInterim;
                if (transInterim) {
                    latestSubtitle = transInterim; 
                }

                updateTranscriptUI();
                updateSubtitleUI(); 

                if (subtitleTimeout) clearTimeout(subtitleTimeout);
                subtitleTimeout = setTimeout(() => {
                    latestSubtitle = '';
                    updateSubtitleUI();
                }, 5000);
            };
            recognition.onend = () => {
                isStarted = false;
                if (isListening) recognition.start();
            };
        }

        async function startVisualizer() {
            try {
                const deviceId = ui.deviceSelect.value;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: deviceId ? { deviceId: { exact: deviceId } } : true });
                activeStream = stream;
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                function updateVolume() {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = dataArray.reduce((a, b) => a + b, 0);
                    const average = sum / bufferLength;
                    const volumePercent = Math.min(100, (average / 60) * 100);
                    if (ui.volumeBar) ui.volumeBar.style.width = `${volumePercent}%`;
                    animationFrameId = requestAnimationFrame(updateVolume);
                }
                updateVolume();
            } catch (err) { turnOffListening(); }
        }

        function stopVisualizer() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (audioCtx) audioCtx.close();
            if (activeStream) activeStream.getTracks().forEach(t => t.stop());
            if (ui.volumeBar) ui.volumeBar.style.width = '0%';
        }

        function turnOffListening() {
            isListening = false;
            if (recognition) recognition.stop();
            stopVisualizer();
            interimStr = '';
            updateListeningUI();
        }

        function toggleListening() {
            if (isListening) turnOffListening();
            else {
                isListening = true;
                if (!isStarted) recognition.start();
                startVisualizer();
                updateListeningUI();
            }
        }

        ui.btnToggle.addEventListener('click', toggleListening);
        ui.btnPip.addEventListener('click', async () => {
            if (pipWindow) { pipWindow.close(); return; }
            const css = `
                body { margin: 0; background: rgba(0,0,0,0.9); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
                #subtitle { font-size: 28px; font-weight: bold; text-align: center; width: 100%; padding: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #4ade80; }
            `;
            if ('documentPictureInPicture' in window) {
                try {
                    pipWindow = await documentPictureInPicture.requestWindow({ width: 600, height: 80 });
                    const s = pipWindow.document.createElement('style'); s.textContent = css; pipWindow.document.head.appendChild(s);
                    subtitleContainer = pipWindow.document.createElement('div'); subtitleContainer.id = 'subtitle';
                    subtitleContainer.textContent = latestSubtitle || '等待語音...';
                    pipWindow.document.body.appendChild(subtitleContainer);
                    pipWindow.addEventListener('pagehide', () => { pipWindow = null; subtitleContainer = null; });
                    return;
                } catch (e) {}
            }
            showToast('瀏覽器不支援置頂視窗', 'warning');
        });

        ui.btnClear.addEventListener('click', () => {
            finalStr = ''; interimStr = ''; latestSubtitle = '';
            updateTranscriptUI(); updateSubtitleUI();
            showToast('文字已清除');
        });

        ui.btnCopy.addEventListener('click', () => {
            const text = finalStr + interimStr;
            if (!text) return showToast('無文字', 'warning');
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            showToast('已複製！');
        });

        ui.languageSelect.addEventListener('change', (e) => { if (recognition) recognition.lang = e.target.value; });
        getDevices();
        initSpeechRecognition();
    </script>
</body>
</html>
