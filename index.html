<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 即時語音轉文字 (Cantonese.ai)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5); 
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(75, 85, 99, 0.8); 
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(107, 114, 128, 1); 
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 flex flex-col font-sans selection:bg-blue-500/30">

    <!-- 頂部導覽列 -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div id="header-icon-bg" class="p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors duration-300">
                <i data-lucide="mic" id="header-icon-mic"></i>
                <i data-lucide="mic-off" id="header-icon-mic-off" class="hidden"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider hidden sm:block">AI 即時語音轉文字</h1>
            <span class="bg-indigo-500/20 text-indigo-400 text-xs px-2 py-1 rounded-md border border-indigo-500/30 font-medium">Cantonese.ai 官方端點</span>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- 港台用語轉換開關 -->
            <label class="flex items-center cursor-pointer gap-2" title="開啟後，會自動將香港用語轉為台灣用語">
                <span class="text-sm text-gray-300 hidden sm:inline">港→台轉換</span>
                <span class="text-sm text-gray-300 sm:hidden">港→台</span>
                <div class="relative flex items-center">
                    <input type="checkbox" id="toggle-hk-tw" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 peer-checked:after:bg-white after:border-gray-400 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                </div>
            </label>
        </div>
    </header>

    <!-- 系統音訊模式提示 -->
    <div class="bg-indigo-500/10 border-l-4 border-indigo-500 p-4 m-6 mb-0 rounded-r-lg flex flex-col sm:flex-row items-start gap-3 shadow-sm">
        <i data-lucide="zap" class="text-indigo-400 shrink-0 mt-0.5 w-5 h-5"></i>
        <div class="text-indigo-300 text-sm leading-relaxed flex-1">
            <p class="font-bold mb-1 text-indigo-200">【引擎升級】已完全遵循 Cantonese.ai 官方文件實作</p>
            <p>只要在下方選單選擇「VoiceMeeter Output」或您的系統麥克風，AI 就會<strong>完全同步</strong>聽取該裝置的聲音。程式會在背景自動將音訊轉碼為 WAV 格式，確保傳輸精準無誤！</p>
        </div>
    </div>

    <!-- 錯誤提示區塊 -->
    <div id="error-container" class="hidden bg-red-500/10 border-l-4 border-red-500 p-4 m-6 mb-0 rounded-r-lg flex items-start gap-3">
        <i data-lucide="alert-circle" class="text-red-500 shrink-0 mt-0.5 w-5 h-5"></i>
        <p id="error-message" class="text-red-400 text-sm leading-relaxed"></p>
    </div>

    <!-- 主要文字顯示區 -->
    <main class="flex-1 flex flex-col p-6 max-w-5xl w-full mx-auto relative overflow-hidden">
        <div id="transcript-container" class="flex-1 bg-gray-800/50 border border-gray-700/50 rounded-2xl p-6 md:p-8 overflow-y-auto shadow-inner relative flex flex-col scroll-smooth">

                <p class="text-xl font-light tracking-widest flex flex-col items-center gap-4">
                    <i data-lucide="mic" class="w-12 h-12"></i>
                    選好測試音軌後，點擊下方按鈕開始
                </p>
            </div>

            <div class="text-2xl md:text-3xl leading-relaxed md:leading-loose tracking-wide break-words pb-10">
                <span id="final-transcript" class="text-gray-100 transition-colors duration-200"></span>
                <span id="interim-transcript" class="text-indigo-400/70 text-xl font-medium transition-colors duration-200 ml-1"></span>
                <span id="cursor-anim" class="hidden inline-block w-2 h-6 md:h-8 bg-blue-500 ml-2 animate-pulse align-middle rounded-full"></span>
                <div id="transcript-end"></div>
            </div>
        </div>

                    <i data-lucide="volume-2" class="text-gray-400 w-4 h-4"></i>
                    <select id="device-select" class="bg-gray-900 text-sm text-gray-200 outline-none cursor-pointer w-full max-w-[180px] truncate disabled:opacity-50 appearance-none pr-4">
                        <optgroup label="實體與虛擬裝置" id="device-list" class="bg-gray-900">
                            <option value="" class="bg-gray-900">讀取裝置中...</option>
                        </optgroup>
                        <optgroup label="獨立系統音效測試" class="bg-gray-900">
                            <option value="system_display" class="bg-gray-900">🌐 擷取分頁/電腦聲音</option>
                        </optgroup>
                    </select>
                    <div class="absolute right-3 pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <button id="btn-toggle" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30">
                    <i data-lucide="mic" id="btn-icon-mic" class="w-5 h-5"></i>
                    <span id="btn-pulse" class="hidden w-2.5 h-2.5 bg-white rounded-full animate-pulse"></span>
                    <span id="btn-text">開始說話</span>
                </button>
                
                <!-- 狀態指示 -->
                <div class="hidden sm:flex items-center gap-2 text-sm text-gray-400">
                    <span class="relative flex h-3 w-3">
                        <span id="status-ping" class="hidden animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-gray-600"></span>
                    </span>
                    <span id="status-text">待機中</span>
                </div>

                <div id="volume-container" class="hidden sm:flex items-center gap-2 ml-2 w-32 transition-opacity duration-300 opacity-30">
                    <span class="text-xs text-gray-500">音量</span>
                    <div class="flex-1 h-2 bg-gray-700/50 rounded-full overflow-hidden border border-gray-600/50 relative">
                        <div id="volume-bar" class="h-full bg-green-500 rounded-full w-0 transition-all duration-75 ease-out"></div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button id="btn-copy" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 transition-colors" title="複製全文">

                    <span class="sm:hidden">複製</span>
                </button>
                <button id="btn-clear" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-gray-700 hover:bg-red-500/20 hover:text-red-400 text-gray-200 transition-colors" title="清除文字">

        </div>

        // --- UI 更新與輔助功能 ---
        function showError(msg) {
            if (msg) {
                ui.errorMessage.textContent = msg;
                ui.errorContainer.classList.remove('hidden');
            } else {
                ui.errorContainer.classList.add('hidden');
            }
        }

        function showToast(msg, type = 'success') {
            ui.toastMessage.textContent = msg;
            if (type === 'success') {
                ui.toastIcon.setAttribute('data-lucide', 'check');
                ui.toastIcon.classList.remove('text-yellow-400');
                ui.toastIcon.classList.add('text-green-400');
            } else if (type === 'warning') {
                ui.toastIcon.setAttribute('data-lucide', 'alert-triangle');
                ui.toastIcon.classList.remove('text-green-400');
                ui.toastIcon.classList.add('text-yellow-400');
            }
            lucide.createIcons();

            ui.toast.classList.remove('opacity-0', 'translate-y-4');
            ui.toast.classList.add('opacity-100', 'translate-y-0');
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                ui.toast.classList.remove('opacity-100', 'translate-y-0');
                ui.toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        function scrollToBottom() {
            ui.transcriptContainer.scrollTop = ui.transcriptContainer.scrollHeight;
        }

        function updateTranscriptUI() {
            ui.finalTranscript.textContent = finalStr;
            
            if (!finalStr && !isListening) {
                ui.placeholderText.classList.remove('hidden');
            } else {
                ui.placeholderText.classList.add('hidden');
            }
            scrollToBottom();
        }

        function updateListeningUI() {
            if (isListening) {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-red-500/20 text-red-500 animate-pulse transition-colors duration-300';
                ui.headerIconMic.classList.add('hidden');
                ui.headerIconMicOff.classList.remove('hidden');
            } else {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors duration-300';
                ui.headerIconMic.classList.remove('hidden');
                ui.headerIconMicOff.classList.add('hidden');
            }

            ui.deviceSelect.disabled = isListening;
            
            if (isListening) ui.cursorAnim.classList.remove('hidden');
            else ui.cursorAnim.classList.add('hidden');

            if (isListening) {
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-500/30';
                ui.btnIconMic.classList.add('hidden');
                ui.btnPulse.classList.remove('hidden');
                ui.btnText.textContent = '停止聆聽';
            } else {
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30';
                ui.btnIconMic.classList.remove('hidden');
                ui.btnPulse.classList.add('hidden');
                ui.btnText.textContent = '開始說話';
            }

            if (isListening) {
                ui.statusPing.classList.remove('hidden');
                ui.statusDot.className = 'relative inline-flex rounded-full h-3 w-3 bg-green-500';
                ui.statusText.textContent = '聆聽中';
                ui.volumeContainer.classList.remove('opacity-30');
                ui.volumeContainer.classList.add('opacity-100');
            } else {
                ui.statusPing.classList.add('hidden');
                ui.statusDot.className = 'relative inline-flex rounded-full h-3 w-3 bg-gray-600';
                ui.statusText.textContent = '待機中';
                ui.volumeContainer.classList.add('opacity-30');
                ui.volumeContainer.classList.remove('opacity-100');
            }
            updateTranscriptUI();
        }

        // --- 取得設備清單 ---
        async function getDevices() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                ui.deviceList.innerHTML = '<option value="">您的瀏覽器不支援獲取裝置</option>';
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(d => d.kind === 'audioinput');
                
                ui.deviceList.innerHTML = '';
                if (audioInputs.length === 0) {
                    ui.deviceList.innerHTML = '<option value="" class="bg-gray-900">找不到麥克風裝置</option>';
                } else {
                    audioInputs.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.className = 'bg-gray-900';
                        option.textContent = device.label || `未知音訊裝置 ${device.deviceId.substring(0, 5) || index + 1}`;
                        ui.deviceList.appendChild(option);
                    });
                }
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.log('無法獲取錄音裝置列表:', err);
            }
        }

        // --- 將瀏覽器錄製的音訊檔轉為標準 WAV 格式 ---
        async function convertToWav(blob) {
            if (!decodeAudioCtx) {
                decodeAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await decodeAudioCtx.decodeAudioData(arrayBuffer);
            
            const numOfChan = audioBuffer.numberOfChannels;
            const length = audioBuffer.length * numOfChan * 2 + 44;
            const buffer = new ArrayBuffer(length);
            const view = new DataView(buffer);
            let offset = 0;

            function writeString(str) {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
                offset += str.length;
            }
            function writeUint32(data) {
                view.setUint32(offset, data, true);
                offset += 4;
            }
            function writeUint16(data) {
                view.setUint16(offset, data, true);
                offset += 2;
            }

            writeString('RIFF');
            writeUint32(length - 8);
            writeString('WAVE');
            writeString('fmt ');
            writeUint32(16);
            writeUint16(1); // PCM
            writeUint16(numOfChan);
            writeUint32(audioBuffer.sampleRate);
            writeUint32(audioBuffer.sampleRate * 2 * numOfChan);
            writeUint16(numOfChan * 2);
            writeUint16(16);
            writeString('data');
            writeUint32(length - offset - 4);

            for (let i = 0; i < audioBuffer.length; i++) {
                for (let channel = 0; channel < numOfChan; channel++) {
                    let sample = audioBuffer.getChannelData(channel)[i];
                    sample = Math.max(-1, Math.min(1, sample));
                    sample = sample < 0 ? sample * 32768 : sample * 32767;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
            }

            return new Blob([buffer], { type: 'audio/wav' });
        }

        // --- 發送至 Cantonese.ai 官方 API ---
        async function transcribeAudio(blob) {
            if (!isListening) return;

            ui.interimTranscript.textContent = " (辨識中...)";

            try {
                // 將瀏覽器產生的 WebM 或 MP4 轉檔為官方支援的 WAV 格式
                const wavBlob = await convertToWav(blob);

                // 嚴格依照官方文件設定參數
                const formData = new FormData();
                formData.append('api_key', CANTONESE_API_KEY);
                formData.append('data', wavBlob, 'audio.wav');
                formData.append('with_timestamp', 'false');
                formData.append('with_diarization', 'false');

                // 使用 POST 加上 FormData 的簡單請求 (Simple Request)，避免觸發 OPTIONS CORS 預檢
                const response = await fetch('https://cantonese.ai/api/stt', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    console.warn("STT API 錯誤狀態碼:", response.status);
                    ui.interimTranscript.textContent = "";
                    if (response.status === 415) {
                        showToast("API 不支援目前的瀏覽器音訊格式。", "warning");
                    } else if (response.status === 401) {
                        showToast("API 授權驗證失敗。", "warning");
                    } else {
                        showToast(`API 錯誤: HTTP ${response.status}`, "warning");
                    }
                    return;
                }

                const result = await response.json();
                ui.interimTranscript.textContent = "";

                if (result.text && result.text.trim()) {
                    let text = result.text.trim();
                    const isConvertEnabled = ui.toggleHkTw.checked;
                    
                    if (isConvertEnabled) {
                        text = convertHKTextToTW(text).text;
                    }
                    
                    finalStr += text + '，';
                    updateTranscriptUI();
                }
            } catch(e) {
                console.warn("連線受阻:", e);
                ui.interimTranscript.textContent = "";
                showToast("網路連線錯誤，請確認網路狀態。", "warning");
                turnOffListening();
            }
        }

        // --- 智慧截斷 (VAD) 錄音邏輯 ---
        function startRecordingChunk() {
            if (mediaRecorder && mediaRecorder.state === 'recording') return;
            audioChunks = [];
            
            try {
                let options = {};
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    options = { mimeType: 'audio/webm;codecs=opus' };
                } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    options = { mimeType: 'audio/mp4' };
                }
                
                mediaRecorder = new MediaRecorder(activeStream, options);
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.onstop = () => {
                    const blobType = options.mimeType ? options.mimeType.split(';')[0] : 'audio/webm';
                    const blob = new Blob(audioChunks, { type: blobType });
                    if (blob.size > 1000 && isListening) {
                        transcribeAudio(blob);
                    }
                };
                mediaRecorder.start();

                // 強制最多 8 秒截斷一次
                maxDurationTimer = setTimeout(() => {
                    stopRecordingChunk();
                }, 8000);
            } catch (e) {
                console.warn("錄音器初始化失敗:", e);
            }
        }

        function stopRecordingChunk() {
            if (silenceTimer) clearTimeout(silenceTimer);
            if (maxDurationTimer) clearTimeout(maxDurationTimer);
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                try { mediaRecorder.stop(); } catch(e) {}
            }
            isSpeaking = false;
        }

        // --- 音量視覺化與 VAD 核心迴圈 ---
        async function startVisualizer() {
            try {
                let stream;
                const deviceId = ui.deviceSelect.value;

                if (deviceId === 'system_display') {
                    stream = await navigator.mediaDevices.getDisplayMedia({ audio: true, video: true });
                    if (stream.getAudioTracks().length === 0) {
                        showToast('⚠️ 警告：您分享畫面時未勾選「分享音訊」！', 'warning');
                        stream.getTracks().forEach(track => track.stop());
                        turnOffListening();
                        return;
                    }
                } else {
                    const constraints = {
                        audio: deviceId ? { deviceId: { exact: deviceId } } : true
                    };
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                }

                activeStream = stream;
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                const audioTrack = stream.getAudioTracks()[0];
                const audioStream = new MediaStream([audioTrack]);
                const source = audioCtx.createMediaStreamSource(audioStream);
                source.connect(analyser);

                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function processAudioFrame() {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / bufferLength;
                    
                    const volumePercent = Math.min(100, (average / 60) * 100);

                    if (ui.volumeBar) {
                        ui.volumeBar.style.width = `${volumePercent}%`;
                        if (volumePercent > 80) {
                            ui.volumeBar.className = "h-full bg-red-500 rounded-full transition-all duration-75 ease-out";
                        } else if (volumePercent > 40) {
                            ui.volumeBar.className = "h-full bg-yellow-400 rounded-full transition-all duration-75 ease-out";
                        } else {
                            ui.volumeBar.className = "h-full bg-green-500 rounded-full transition-all duration-75 ease-out";
                        }
                    }

                    // --- VAD (語音活動偵測) 邏輯 ---
                    if (isListening) {
                        if (volumePercent > 6) { // 說話觸發閥值
                            if (!isSpeaking) {
                                isSpeaking = true;
                                startRecordingChunk();
                            }
                            if (silenceTimer) clearTimeout(silenceTimer);
                            silenceTimer = setTimeout(() => {
                                stopRecordingChunk();
                            }, 1200); 
                        }
                    }

                    animationFrameId = requestAnimationFrame(processAudioFrame);
                }
                processAudioFrame();

            } catch (err) {
                console.log('麥克風存取失敗:', err.message || err);
                showError('無法取得音訊串流，請確認瀏覽器權限或嘗試切換下拉選單裝置。');
                turnOffListening();
            }
        }

        function stopVisualizer() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            if (audioCtx && audioCtx.state !== 'closed') {
                audioCtx.close();
            }
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
            }
            if (ui.volumeBar) {
                ui.volumeBar.style.width = '0%';
            }
            audioCtx = null;
            analyser = null;
            activeStream = null;
        }

        // --- 核心控制 ---
        function turnOffListening() {
            isListening = false;
            stopRecordingChunk();
            stopVisualizer();
            ui.interimTranscript.textContent = "";
            updateListeningUI();
        }

        function toggleListening() {
            if (isListening) {
                turnOffListening();
            } else {
                showError('');
                isListening = true;
                updateListeningUI();
                startVisualizer();
            }
        }

        // --- 港台用語轉換功能 ---
        function convertHKTextToTW(text) {
            if (!text) return { text: '', count: 0 };
            let convertedText = text;
            let count = 0;
            for (const [hk, tw] of Object.entries(hkToTwMap)) {
                const regex = new RegExp(hk, 'g');
                if (convertedText.match(regex)) {
                    count += convertedText.match(regex).length;
                    convertedText = convertedText.replace(regex, tw);
                }
            }
            return { text: convertedText, count };
        }

        // --- 事件綁定 ---
        ui.btnToggle.addEventListener('click', toggleListening);

        ui.btnClear.addEventListener('click', () => {
            finalStr = '';
            updateTranscriptUI();
            showToast('文字已清除');
        });

        ui.btnCopy.addEventListener('click', () => {
            if (!finalStr) {
                showToast('沒有可複製的文字', 'warning');
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = finalStr;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('已成功複製到剪貼簿！');
            } catch (err) {
                showToast('複製失敗，請手動選取複製', 'warning');
            }
            document.body.removeChild(textArea);
        });

        ui.toggleHkTw.addEventListener('change', (e) => {
            if (e.target.checked) {
                showToast('已開啟港→台自動轉換功能');
            } else {
                showToast('已關閉轉換，保留原始用語');
            }
        });

        // 監聽裝置變更
        if (navigator.mediaDevices) {
            navigator.mediaDevices.addEventListener('devicechange', getDevices);
        }

        // 初始化執行
        getDevices();

    </script>
</body>
