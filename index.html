<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 即時語音轉文字</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(31, 41, 55, 0.5); border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.8); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 1); }
    </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 flex flex-col font-sans selection:bg-blue-500/30">

    <!-- 頂部導覽列 -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex flex-wrap items-center justify-between shadow-sm z-10 gap-4">
        <div class="flex items-center gap-3">
            <div id="header-icon-bg" class="p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors duration-300">
                <i data-lucide="mic" id="header-icon-mic"></i>
                <i data-lucide="mic-off" id="header-icon-mic-off" class="hidden"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider hidden sm:block">AI 即時語音轉文字</h1>
            <span class="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded-md border border-gray-600 font-medium">穩定版</span>
        </div>
        
        <div class="flex items-center gap-4 flex-wrap">
            <!-- 粵語轉書面語開關 -->
            <label class="flex items-center cursor-pointer gap-2" title="開啟後，會自動將廣東話口語轉為標準中文書面語">
                <span class="text-sm text-gray-300 hidden sm:inline">轉書面語</span>
                <span class="text-sm text-gray-300 sm:hidden">轉書面語</span>
                <div class="relative flex items-center">
                    <input type="checkbox" id="toggle-yue-md" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-400 peer-checked:after:bg-white after:border-gray-400 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                </div>
            </label>

            <!-- 語言選擇 -->
            <div class="flex items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-lg border border-gray-700">
                <i data-lucide="settings" class="text-gray-400 w-4 h-4"></i>
                <select id="language-select" class="bg-gray-900 text-sm text-gray-200 outline-none cursor-pointer">
                    <option value="zh-HK" selected>繁體中文 (香港)</option>
                    <option value="zh-TW">繁體中文 (台灣)</option>
                    <option value="zh-CN">簡體中文 (中國)</option>
                    <option value="en-US">English (US)</option>
                </select>
            </div>
        </div>
    </header>

    <!-- 系統提示 -->
    <div class="bg-blue-500/10 border-l-4 border-blue-500 p-4 m-6 mb-0 rounded-r-lg flex items-start gap-3 shadow-sm">
        <i data-lucide="info" class="text-blue-400 shrink-0 mt-0.5 w-5 h-5"></i>
        <div class="text-blue-300 text-sm leading-relaxed flex-1">
            <p>1. 辨識永遠取自電腦系統的**預設麥克風**。</p>
            <p>2. **透明字幕視窗**：累積滿 12 字會全數清空重新開始。網址列為瀏覽器安全設計，無法移除。</p>
        </div>
    </div>

    <!-- 辨識區 -->
    <main class="flex-1 flex flex-col p-6 max-w-5xl w-full mx-auto relative overflow-hidden">
        <div id="transcript-container" class="flex-1 bg-gray-800/50 border border-gray-700/50 rounded-2xl p-6 md:p-8 overflow-y-auto shadow-inner relative flex flex-col scroll-smooth">
            <div id="placeholder-text" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
                <p class="text-xl font-light tracking-widest flex flex-col items-center gap-4">
                    <i data-lucide="mic" class="w-12 h-12"></i>
                    點擊下方按鈕開始辨識
                </p>
            </div>
            <div class="text-2xl md:text-3xl leading-relaxed md:leading-loose tracking-wide break-words pb-10">
                <span id="final-transcript" class="text-gray-100 transition-colors duration-200"></span>
                <span id="cursor-anim" class="hidden inline-block w-2 h-6 md:h-8 bg-blue-500 ml-2 animate-pulse align-middle rounded-full"></span>
            </div>
        </div>

        <!-- 底部控制 -->
        <div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4 bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-xl">
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                <div class="flex items-center gap-2 bg-gray-900 px-3 py-2.5 rounded-xl border border-gray-700 w-full sm:w-auto relative group">
                    <i data-lucide="volume-2" class="text-gray-400 w-4 h-4"></i>
                    <select id="device-select" class="bg-gray-900 text-sm text-gray-200 outline-none cursor-pointer w-full max-w-[150px] truncate appearance-none pr-4">
                        <optgroup label="音訊測試裝置" id="device-list" class="bg-gray-900">
                            <option value="">讀取裝置...</option>
                        </optgroup>
                    </select>
                    <div class="absolute right-3 pointer-events-none text-gray-500 text-xs">▼</div>
                </div>

                <button id="btn-toggle" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-bold transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30 min-w-[140px]">
                    <i data-lucide="mic" id="btn-icon-mic" class="w-5 h-5"></i>
                    <span id="btn-text">開始說話</span>
                </button>
                
                <button id="btn-pip" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-3 rounded-xl font-medium transition-all duration-300 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-600 hover:text-white" title="開啟桌面透明置頂字幕">
                    <i data-lucide="monitor-up" class="w-5 h-5"></i>
                    <span>透明置頂字幕</span>
                </button>

                <!-- 音量條 -->
                <div id="volume-container" class="hidden sm:flex items-center gap-2 ml-2 w-24">
                    <div class="flex-1 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                        <div id="volume-bar" class="h-full bg-green-500 w-0 transition-all duration-75"></div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button id="btn-copy" class="p-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200" title="複製內容"><i data-lucide="copy" class="w-5 h-5"></i></button>
                <button id="btn-clear" class="p-3 rounded-lg bg-gray-700 hover:bg-red-500/20 hover:text-red-400 text-gray-200" title="清除文字"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-gray-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-all duration-300 opacity-0 pointer-events-none z-50">
        <i data-lucide="check" class="text-green-400 w-4 h-4"></i>
        <span id="toast-message"></span>
    </div>

    <script>
        lucide.createIcons();

        // --- 廣東話口語 ➔ 標準書面語字典 ---
        const yueToWrittenMap = {
            '的士': '計程車', '巴士': '公車', '小巴': '小型公車', '輕鐵': '輕軌',
            '雪糕': '冰淇淋', '朱古力': '巧克力', '士多啤梨': '草莓', '雲呢拿': '香草', '班戟': '鬆餅',
            '多士': '吐司', '三文治': '三明治', '沙律': '沙拉', '啫喱': '果凍', '忌廉': '鮮奶油',
            '芝士': '起司', '牛油果': '酪梨', '薯仔': '馬鈴薯', '青瓜': '小黃瓜', '粟米': '玉米',
            '雪櫃': '冰箱', '冷氣': '空調', '手提電話': '手機', '差電': '充電', '單車': '自行車', '電單車': '機車',
            '質素': '品質', '戶口': '帳戶', '好似': '好像', '點解': '為什麼',
            '返工': '上班', '放工': '下班', '番工': '上班', '返學': '上學', '番學': '上學', '放學': '放學',
            '傾偈': '交談', '屋企': '家裡', '食飯': '用餐', '飲水': '喝水',
            '睇戲': '看電影', '行街': '逛街', '買嘢': '購物', '畀錢': '付款', '搵錢': '賺錢',
            '做嘢': '工作', '瞓覺': '睡覺', '起身': '起床', '沖涼': '沐浴', '食煙': '抽菸', '飲酒': '喝酒',
            '有冇': '有沒有', '係咪': '是不是', '好唔好': '好不好', '得唔得': '行不行', '唔得': '不行',
            '唔記得': '忘記了', '病咗': '生病了', '頸渴': '口渴', '為咗': '為了', '早晨': '早安', '隔籬': '隔壁',
            '鍾意': '喜歡', '唔鍾意': '不喜歡', '點樣': '如何', '邊度': '哪裡', '邊個': '誰', '幾時': '何時', '幾多': '多少',
            '咁樣': '如此', '呢度': '這裡', '嗰度': '那裡', '佢哋': '他們', '我哋': '我們', '你哋': '你們', '佢': '他',
            '聽日': '明天', '琴日': '昨天', '尋日': '昨天', '今日': '今天', '而家': '現在', '依家': '現在',
            '頭先': '剛才', '一陣': '稍後', '次次': '每次', '成日': '經常', '真係': '確實',
            '係': '是', '唔': '不', '喺': '在', '嘅': '的', '嗰': '那', '呢': '這', '咁': '那麼', '啲': '的',
            '乜': '什麼', '嘢': '事物', '晒': '完', '咗': '了', '緊': '正在', '住': '著',
            '埋': '連同', '先': '才', '仲': '還', '諗': '思考', '識': '懂', '明': '明白',
            '覺': '覺得', '靚': '美麗', '污糟': '骯髒', '攰': '疲勞', '痕': '發癢', '憎': '厭惡',
            '攞': '拿取', '擺': '放置', '閂': '關閉', '企': '站立', '行': '行走', '著': '穿著', '除': '脫下',
            '痴': '黏貼', '喊': '哭泣', '彈': '批評', '畀': '給予', '睇': '觀看'
        };

        const ui = {
            languageSelect: document.getElementById('language-select'),
            toggleYueMd: document.getElementById('toggle-yue-md'),
            deviceSelect: document.getElementById('device-select'),
            deviceList: document.getElementById('device-list'),
            btnToggle: document.getElementById('btn-toggle'),
            btnPip: document.getElementById('btn-pip'),
            finalTranscript: document.getElementById('final-transcript'),
            volumeBar: document.getElementById('volume-bar'),
            transcriptContainer: document.getElementById('transcript-container'),
            placeholderText: document.getElementById('placeholder-text'),
            headerIconBg: document.getElementById('header-icon-bg'),
            btnText: document.getElementById('btn-text'),
            btnIconMic: document.getElementById('btn-icon-mic')
        };

        let isListening = false;
        let isStarted = false;
        let finalStr = '';
        let interimStr = '';
        
        // --- 透明字幕視窗核心變數 ---
        let pipWindow = null; 
        let subtitleContainer = null;
        let pipBuffer = ""; 
        let subtitleTimeout = null;

        let recognition = null;
        let audioCtx = null;
        let analyser = null;
        let animationFrameId = null;
        let activeStream = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => toast.classList.remove('opacity-100', 'translate-y-0'), 3000);
        }

        function updateUIState() {
            if (isListening) {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-red-500/20 text-red-500 animate-pulse';
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-bold transition-all duration-300 transform active:scale-95 bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-500/30 min-w-[140px]';
                ui.btnText.textContent = '停止聆聽';
                ui.btnIconMic.setAttribute('data-lucide', 'mic-off');
                document.getElementById('volume-container').classList.remove('hidden');
            } else {
                ui.headerIconBg.className = 'p-2 rounded-lg bg-blue-500/20 text-blue-400';
                ui.btnToggle.className = 'flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-bold transition-all duration-300 transform active:scale-95 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30 min-w-[140px]';
                ui.btnText.textContent = '開始說話';
                ui.btnIconMic.setAttribute('data-lucide', 'mic');
                document.getElementById('volume-container').classList.add('hidden');
                ui.volumeBar.style.width = '0%';
            }
            lucide.createIcons();
            ui.languageSelect.disabled = isListening;
            ui.deviceSelect.disabled = isListening;
        }

        function convertYueToWritten(text) {
            if (!text) return { text: '' };
            let convertedText = text;
            const sortedKeys = Object.keys(yueToWrittenMap).sort((a, b) => b.length - a.length);
            for (const hk of sortedKeys) {
                const tw = yueToWrittenMap[hk];
                const regex = new RegExp(hk, 'g');
                convertedText = convertedText.replace(regex, tw);
            }
            return { text: convertedText };
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = ui.languageSelect.value;
            
            recognition.onstart = () => { isStarted = true; };
            recognition.onresult = (event) => {
                let tempFinal = '';
                let tempInterim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) tempFinal += event.results[i][0].transcript;
                    else tempInterim += event.results[i][0].transcript;
                }
                
                const isConvertEnabled = ui.toggleYueMd.checked;
                let tFinal = tempFinal ? (isConvertEnabled ? convertYueToWritten(tempFinal).text : tempFinal) : '';
                let tInterim = tempInterim ? (isConvertEnabled ? convertYueToWritten(tempInterim).text : tempInterim) : '';

                if (tFinal) {
                    finalStr += tFinal + '，';
                    // --- 12 字循環清空邏輯 (整批) ---
                    // 如果原本緩衝區加上新字會超過 12，則先清空舊的，直接從新字開始
                    if ((pipBuffer + tFinal).length > 12) {
                        pipBuffer = tFinal;
                    } else {
                        pipBuffer += tFinal;
                    }
                }
                interimStr = tInterim;

                ui.finalTranscript.textContent = finalStr + interimStr;
                ui.transcriptContainer.scrollTop = ui.transcriptContainer.scrollHeight;
                if (finalStr || interimStr) ui.placeholderText.classList.add('hidden');

                if (pipWindow && subtitleContainer) {
                    let display = pipBuffer + tInterim;
                    // 如果正在講的那句 interim 瞬間超長也得裁切，直到它變成 Final 進入下一頁
                    if (display.length > 12) {
                        display = display.slice(-12);
                    }
                    subtitleContainer.textContent = display;

                    if (subtitleTimeout) clearTimeout(subtitleTimeout);
                    subtitleTimeout = setTimeout(() => { pipBuffer = ""; subtitleContainer.textContent = ""; }, 5000);
                }
            };
            recognition.onend = () => {
                isStarted = false;
                if (isListening) recognition.start();
            };
        }

        async function startVisualizer() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: ui.deviceSelect.value ? { deviceId: { exact: ui.deviceSelect.value } } : true });
                activeStream = stream;
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const update = () => {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                    ui.volumeBar.style.width = `${Math.min(100, (avg / 60) * 100)}%`;
                    animationFrameId = requestAnimationFrame(update);
                };
                update();
            } catch (e) {}
        }

        function toggleListening() {
            if (isListening) {
                isListening = false;
                recognition.stop();
                if (audioCtx) audioCtx.close();
                if (activeStream) activeStream.getTracks().forEach(t => t.stop());
                updateUIState();
            } else {
                isListening = true;
                if (!isStarted) recognition.start();
                startVisualizer();
                updateUIState();
            }
        }

        ui.btnPip.addEventListener('click', async () => {
            if (pipWindow) { pipWindow.close(); return; }
            
            // 背景強制設定為完全透明 rgba(0,0,0,0)
            const css = `
                html, body { 
                    margin: 0; 
                    padding: 0; 
                    background-color: rgba(0,0,0,0) !important; 
                    background: transparent !important;
                    height: 100vh; 
                    overflow: hidden; 
                    display: flex; 
                    align-items: center; 
                    justify-content: center;
                    user-select: none;
                }
                #subtitle { 
                    font-size: 38px; 
                    font-weight: 800; 
                    color: #ffffff; 
                    text-align: center; 
                    width: 100%; 
                    padding: 0 10px; 
                    white-space: nowrap; 
                    overflow: hidden; 
                    font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
                    letter-spacing: 2px;
                    /* 強大的描邊與陰影，確保在全透明背景下能被看見 */
                    -webkit-text-stroke: 1.5px #000000;
                    text-shadow: 
                        3px 3px 0 #000, 
                        -1px -1px 0 #000,  
                        1px -1px 0 #000,
                        -1px 1px 0 #000,
                        1px 1px 0 #000;
                }
            `;

            if ('documentPictureInPicture' in window) {
                try {
                    pipWindow = await documentPictureInPicture.requestWindow({ width: 550, height: 60 });
                    const style = pipWindow.document.createElement('style');
                    style.textContent = css;
                    pipWindow.document.head.appendChild(style);
                    
                    // 將視窗本體設為透明
                    pipWindow.document.body.style.background = 'transparent';

                    subtitleContainer = pipWindow.document.createElement('div');
                    subtitleContainer.id = 'subtitle';
                    subtitleContainer.textContent = '等待語音...';
                    pipWindow.document.body.appendChild(subtitleContainer);
                    
                    pipWindow.addEventListener('pagehide', () => { pipWindow = null; subtitleContainer = null; });
                    showToast('透明字幕視窗已開啟');
                } catch (e) { showToast('開啟失敗'); }
            } else {
                showToast('瀏覽器不支援置頂視窗 API');
            }
        });

        ui.btnToggle.addEventListener('click', toggleListening);
        document.getElementById('btn-clear').addEventListener('click', () => { 
            finalStr = ''; interimStr = ''; pipBuffer = ""; 
            ui.finalTranscript.textContent = ""; 
            if(subtitleContainer) subtitleContainer.textContent = ""; 
            ui.placeholderText.classList.remove('hidden'); 
        });
        document.getElementById('btn-copy').addEventListener('click', () => { 
            const el = document.createElement('textarea'); 
            el.value = finalStr + interimStr; 
            document.body.appendChild(el); 
            el.select(); 
            document.execCommand('copy'); 
            document.body.removeChild(el); 
            showToast('已複製到剪貼簿'); 
        });

        async function getDevices() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                ui.deviceList.innerHTML = '';
                devices.filter(d => d.kind === 'audioinput').forEach((d, i) => {
                    const opt = document.createElement('option'); opt.value = d.deviceId; opt.className = 'bg-gray-900'; opt.textContent = d.label || `麥克風 ${i+1}`; ui.deviceList.appendChild(opt);
                });
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}
        }

        ui.languageSelect.addEventListener('change', () => { if (recognition) recognition.lang = ui.languageSelect.value; });
        getDevices();
        initSpeechRecognition();
    </script>
</body>
</html>
